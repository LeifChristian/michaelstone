<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A memorial for Michael Stone — his music, photographs, and story."
    />
    <meta property="og:title" content="Michael Stone" />
    <meta
      property="og:description"
      content="A quiet memorial for Michael Stone — music, photographs, and story."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://michaelstonepoet.com" />
    <meta property="og:image" content="https://michaelstonepoet.com/images/hero.jpg" />
    <meta name="theme-color" content="#121614" />
    <title>Michael Stone</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('michaelstone:theme')
          document.documentElement.setAttribute(
            'data-theme',
            t === 'light' || t === 'dark' ? t : 'dark',
          )
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
